<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="grad1-small" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle -->
  <circle cx="25" cy="25" r="22" fill="url(#grad1-small)">
    <animate attributeName="r" values="22;21;22" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- H letter -->
  <text x="25" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    H
  </text>
</svg>
