<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with animation -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad1)" stroke-width="3">
    <animate attributeName="r" values="45;47;45" dur="2s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="38" fill="url(#grad1)">
    <animate attributeName="r" values="38;36;38" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- H letter -->
  <text x="50" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">
    H
    <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite" />
  </text>
  
  <!-- Small dots around -->
  <circle cx="50" cy="8" r="3" fill="url(#grad2)">
    <animate attributeName="cy" values="8;12;8" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="92" r="3" fill="url(#grad2)">
    <animate attributeName="cy" values="92;88;92" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="8" cy="50" r="3" fill="url(#grad2)">
    <animate attributeName="cx" values="8;12;8" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="92" cy="50" r="3" fill="url(#grad2)">
    <animate attributeName="cx" values="92;88;92" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
